name: Sync Tableau Data

# Runs every 30 minutes and on manual trigger
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:          # Manual "Run workflow" button in GitHub Actions UI

permissions:
  contents: write             # Required to push data/backlog.json back to the repo

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Python setup
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install Python dependencies
        run: pip install requests

      # 4. Fetch data from Tableau
      - name: Fetch Tableau backlog data
        env:
          TABLEAU_USERNAME: ${{ secrets.TABLEAU_USERNAME }}
          TABLEAU_PASSWORD: ${{ secrets.TABLEAU_PASSWORD }}
        run: python scripts/fetch_tableau.py

      # 5. Commit updated data/backlog.json (only if changed)
      - name: Commit & push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/backlog.json
          git diff --staged --quiet \
            && echo "No data changes — skipping commit" \
            || (git commit -m "chore(data): sync Tableau backlog $(date -u '+%Y-%m-%dT%H:%M:%SZ')" && git push)
